# Render Blueprint — Divani BI (agents performance over Priority ERP)
# Deploy: connect this repo in Render, it auto-detects this file.
# Set the secret env vars in the Render dashboard (Environment) — NOT here.
services:
  - type: web
    name: divani-bi
    runtime: python
    plan: starter             # paid — always-on (background refresher needs no spin-down)
    region: frankfurt          # closest to Israel
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DASH_PASS
        sync: false            # site password — set in dashboard
      - key: SUPABASE_URL
        sync: false            # https://<project>.supabase.co
      - key: SUPABASE_SECRET_KEY
        sync: false            # service-role key — set in dashboard, never commit
      - key: PRI_USER
        sync: false            # Priority OData username
      - key: PRI_PASS
        sync: false            # Priority OData password
      - key: PRI_BASE
        sync: false            # https://divani.wee.co.il/odata/Priority/tabula.ini/vitor
      - key: REFRESH_MINUTES
        value: "15"
      - key: PYTHON_VERSION
        value: "3.13.4"
