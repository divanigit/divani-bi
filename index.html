<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>דיוואני — ביצועים</title>
<style>
  :root{--bd:#0d9668;--bg:#ffffff;--surface:#f4f8f6;--line:#e2e9e5;--line2:#cdd8d2;--tx:#18241f;--tx2:#53635c;--tx3:#8a978f;--okbg:#e3f3ec;--okfg:#0b6e4f;--wbg:#fbf0da;--wfg:#8f5f08;--dbg:#fbe6e4;--dfg:#a3271f;}
  @media (prefers-color-scheme:dark){:root{--bd:#2fbf8f;--bg:#0f1512;--surface:#19211d;--line:#26302b;--line2:#35423b;--tx:#e9efeb;--tx2:#a2b0a9;--tx3:#6f7d76;--okbg:#12312765;--okfg:#63d3a6;--wbg:#2e241065;--wfg:#e0b25a;--dbg:#2e161465;--dfg:#f0968f;}}
  html,body{background:var(--bg);color:var(--tx);margin:0}*{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Hebrew",Arial,sans-serif;-webkit-text-size-adjust:100%}
  .wrap{max-width:640px;margin:0 auto;padding:16px 14px 44px}
  .hdr{display:flex;align-items:center;justify-content:space-between}
  .brand{font-size:12px;font-weight:500;letter-spacing:.12em;color:var(--bd);text-transform:uppercase}
  .out{font-size:11.5px;color:var(--tx3);text-decoration:none;padding:6px 2px}
  h1{font-size:20px;font-weight:500;margin:4px 0 10px}
  .seg{display:inline-flex;background:var(--surface);border:1px solid var(--line2);border-radius:12px;padding:3px;margin:0 0 12px;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .seg::-webkit-scrollbar{display:none}
  .seg button{font-family:inherit;font-size:13px;font-weight:500;border:0;background:none;color:var(--tx2);padding:8px 10px;min-height:44px;border-radius:9px;cursor:pointer;flex:none;white-space:nowrap}
  @media (max-width:390px){.seg button{padding:8px 8px;font-size:12.5px}}
  .seg button.on{background:var(--bd);color:#fff}
  .notice{font-size:12px;color:var(--wfg);margin:6px 2px 0;display:none}
  .selbar{display:flex;align-items:center;gap:8px;margin:0 0 12px;flex-wrap:wrap}
  .selbtn{display:inline-flex;align-items:center;gap:8px;min-height:44px;padding:8px 14px;border:1px solid var(--line2);border-radius:12px;background:var(--surface);color:var(--tx);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer}
  .selbtn svg{width:16px;height:16px;color:var(--bd);flex:none}
  .selbtn .car{width:12px;height:12px;color:var(--tx3)}
  .rfr{display:inline-flex;align-items:center;gap:6px;min-height:44px;padding:8px 12px;border:1px solid var(--line2);border-radius:12px;background:var(--bg);color:var(--tx2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer}
  .rfr svg{width:14px;height:14px}
  .rfr:disabled{opacity:.45;cursor:default}
  .built{font-size:11.5px;color:var(--tx3)}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  @media (max-width:520px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--surface);border-radius:10px;padding:9px 11px}.kpi .l{font-size:11px;color:var(--tx3)}.kpi .v{font-size:17px;font-weight:500;font-variant-numeric:tabular-nums;margin-top:2px}
  .hint{font-size:12px;color:var(--tx3);margin:0 0 8px}
  .pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
  .pill.ok{background:var(--okbg);color:var(--okfg)}.pill.warn{background:var(--wbg);color:var(--wfg)}.pill.bad{background:var(--dbg);color:var(--dfg)}
  .crt{width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent}.crt.up{border-bottom:5px solid currentColor}.crt.down{border-top:5px solid currentColor}
  .mut{color:var(--tx3)}
  .chev{flex:none;width:15px;height:15px;color:var(--tx3);transition:transform .18s ease}.chev.open{transform:rotate(90deg)}
  .tw{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--bg)}
  table{border-collapse:collapse;min-width:452px;width:100%;font-variant-numeric:tabular-nums}
  th{background:var(--surface);color:var(--tx3);font-size:10.5px;font-weight:700;padding:8px 5px;text-align:center;white-space:nowrap}
  th.nm{position:sticky;right:0;z-index:3;text-align:right;box-shadow:-5px 0 5px -5px rgba(0,0,0,.18)}
  td{padding:7px 5px;text-align:center;white-space:nowrap;font-size:12.5px}
  td.nm{position:sticky;right:0;z-index:2;text-align:right;box-shadow:-5px 0 5px -5px rgba(0,0,0,.18)}
  tr.d0 td{background:var(--bg)}tr.dn td{background:var(--surface)}tr.row{cursor:pointer}
  tbody tr+tr td{border-top:1px solid var(--line)}
  tfoot td{border-top:2px solid var(--line2);background:var(--surface);font-weight:500}
  .nmc{display:flex;align-items:center;gap:7px}.nlab{min-width:0}
  .nlab .t{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
  .nlab .c{font-size:10.5px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
  .rail{border-right:2px solid color-mix(in srgb,var(--bd) 40%,transparent);padding-right:8px}
  .empty{border:1px dashed var(--line2);border-radius:14px;padding:34px 16px;text-align:center;color:var(--tx3);font-size:13.5px;line-height:1.7}
  .load{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px 0;color:var(--tx3);font-size:13px}
  .spin{width:18px;height:18px;border:2.5px solid var(--line2);border-top-color:var(--bd);border-radius:50%;animation:sp 0.8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:18px;right:50%;transform:translateX(50%);background:var(--dbg);color:var(--dfg);font-size:13px;padding:10px 16px;border-radius:12px;display:none;z-index:200}
  /* ---- folded date sheet ---- */
  #ovl{position:fixed;inset:0;background:rgba(10,18,14,.45);z-index:90;display:none}
  #sheet{position:fixed;right:0;left:0;bottom:0;z-index:100;background:var(--bg);border-radius:18px 18px 0 0;border:1px solid var(--line);border-bottom:0;box-shadow:0 -12px 40px rgba(0,0,0,.25);padding:14px 16px calc(18px + env(safe-area-inset-bottom));display:none;max-height:86vh;overflow-y:auto}
  @media (min-width:640px){#sheet{left:50%;right:auto;transform:translateX(50%);width:420px;bottom:auto;top:12vh;border-radius:18px;border-bottom:1px solid var(--line)}}
  #sheet.on,#ovl.on{display:block}
  .shead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .shead .t{font-size:15px;font-weight:500}
  .x{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:0;background:none;color:var(--tx3);cursor:pointer;border-radius:10px}
  .x:hover{background:var(--surface)}
  .sec{margin:0 0 14px}
  .sec .sl{font-size:11.5px;color:var(--tx3);margin:0 0 7px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-family:inherit;font-size:13px;font-weight:500;padding:10px 14px;border-radius:22px;border:1px solid var(--line2);background:var(--bg);color:var(--tx2);cursor:pointer;min-height:42px}
  .chip.on{background:var(--bd);border-color:var(--bd);color:#fff}
  .chip:disabled{opacity:.35;cursor:default}
  .frow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .frow label{font-size:12px;color:var(--tx3)}
  .frow input,.frow select{font-family:inherit;font-size:14px;color:var(--tx);background:var(--surface);border:1px solid var(--line2);border-radius:9px;padding:9px 10px;min-height:42px}
  .go{font-family:inherit;font-size:13.5px;font-weight:500;min-height:42px;padding:9px 16px;border:0;border-radius:10px;background:var(--bd);color:#fff;cursor:pointer}
  .cover{font-size:11.5px;color:var(--tx3);border-top:1px solid var(--line);padding-top:10px;margin-top:2px}
  /* ---- ask sheet ---- */
  #asksheet{position:fixed;right:0;left:0;bottom:0;z-index:120;background:var(--bg);border-radius:18px 18px 0 0;border:1px solid var(--line);border-bottom:0;box-shadow:0 -12px 40px rgba(0,0,0,.25);padding:14px 16px calc(18px + env(safe-area-inset-bottom));display:none;max-height:88vh;overflow-y:auto}
  @media (min-width:640px){#asksheet{left:50%;right:auto;transform:translateX(50%);width:520px;bottom:auto;top:8vh;border-radius:18px;border-bottom:1px solid var(--line)}}
  #asksheet.on,#askovl.on{display:block}
  .askrow{display:flex;gap:8px;align-items:flex-end}
  .askrow textarea{flex:1;font-family:inherit;font-size:15px;color:var(--tx);background:var(--surface);border:1px solid var(--line2);border-radius:12px;padding:10px 12px;resize:vertical;min-height:48px}
  .askhint{font-size:11.5px;color:var(--tx3);margin:8px 2px 12px}
  .askitem{border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:10px}
  .askitem .q{font-size:13.5px;font-weight:700;margin-bottom:7px}
  .askitem .a{font-size:13.5px;line-height:1.75;white-space:pre-wrap}
  .askitem .a.err{color:var(--dfg)}
  .askitem .cost{font-size:11px;color:var(--tx3);margin-top:7px}
  #asktotal{font-weight:700}
  .askitem details{margin-top:8px;font-size:11.5px;color:var(--tx3)}
  .askitem details code{display:block;direction:ltr;text-align:left;background:var(--surface);border-radius:8px;padding:7px 9px;margin-top:5px;font-size:10.5px;overflow-x:auto;white-space:pre}
  .askwait{display:flex;align-items:center;gap:9px;color:var(--tx3);font-size:13px;padding:6px 0}
  /* ---- pending transfers strip ---- */
  #pendtr{background:var(--wbg);border:1px solid color-mix(in srgb,var(--wfg) 30%,transparent);border-radius:14px;padding:11px 13px;margin:0 0 12px}
  #pendtr .pt{font-size:13px;font-weight:700;color:var(--wfg);margin-bottom:7px}
  #pendtr .pr{display:flex;align-items:baseline;gap:8px;font-size:12.5px;padding:3px 0;flex-wrap:wrap}
  #pendtr .pr .nm2{font-weight:500}
  #pendtr .pr .mut2{color:var(--tx3);font-size:11px}
  #pendtr .pn{font-size:11px;color:var(--tx3);margin-top:6px}
  .dimbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:0 0 12px}
  .dimbar .chip{font-family:inherit;font-size:13px;border:1px solid var(--line2);background:var(--surface);color:var(--tx2);padding:8px 12px;min-height:40px;border-radius:999px;cursor:pointer}
  .dimbar .chip.on{background:var(--bd);border-color:var(--bd);color:#fff}
  .dimsep{width:1px;height:22px;background:var(--line2);margin:0 4px}
  @media (prefers-reduced-motion:reduce){.chev{transition:none}.spin{animation-duration:1.6s}}
  @media (max-width:420px){h1{font-size:19px}.kpi .v{font-size:16px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr"><div class="brand">דיוואני</div><a class="out" href="/logout">יציאה</a></div>
  <h1 id="h1t">ביצועי סוכנים</h1>
  <div class="seg" id="seg" role="group" aria-label="סוג דוח">
    <button type="button" data-v="agents" class="on" aria-pressed="true">סוכנים</button>
    <button type="button" data-v="branches" aria-pressed="false">סניפים</button>
    <button type="button" data-v="cash" aria-pressed="false">מזומן</button>
    <button type="button" data-v="service" aria-pressed="false">שירות</button>
    <button type="button" data-v="collect" aria-pressed="false">מקדמות</button>
    <button type="button" data-v="dim" aria-pressed="false">פילוח</button>
  </div>
  <div class="dimbar" id="dimbar" style="display:none" role="group" aria-label="בחירת פילוח">
    <button type="button" class="chip on" data-d="fam" aria-pressed="true">קטגוריות</button>
    <button type="button" class="chip" data-d="part" aria-pressed="false">מוצרים</button>
    <button type="button" class="chip" data-d="city" aria-pressed="false">ערים</button>
    <button type="button" class="chip" data-d="sector" aria-pressed="false">מגזר</button>
    <button type="button" class="chip" data-d="source" aria-pressed="false">מקור הגעה</button>
    <span class="dimsep"></span>
    <button type="button" class="chip on" data-m="s" aria-pressed="true">לפי כסף</button>
    <button type="button" class="chip" data-m="q" aria-pressed="false">לפי כמות</button>
  </div>
  <div class="selbar">
    <button type="button" class="selbtn" id="selbtn" aria-haspopup="dialog">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span id="sellbl">טוען…</span>
      <svg class="car" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <button type="button" class="rfr" id="askbtn" title="שאלה חופשית על הנתונים">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/></svg>
      שאלה חופשית
    </button>
    <button type="button" class="rfr" id="rfr" title="רענון נתונים מפריוריטי עכשיו">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
      רענן עכשיו
    </button>
    <span class="built" id="builtlbl"></span>
  </div>
  <div class="notice" id="notice"></div>

  <div class="kpis" id="kpis"></div>
  <div id="pendtr" style="display:none"></div>
  <p class="hint" id="hint">הקש על שורה כדי לצלול · גלול הצידה לעוד עמודות</p>
  <div id="stage"></div>
</div>

<div id="ovl"></div>
<div id="sheet" role="dialog" aria-modal="true" aria-label="בחירת תקופה">
  <div class="shead">
    <span class="t">בחירת תקופה</span>
    <button type="button" class="x" id="shx" aria-label="סגירה"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  </div>
  <div class="sec"><div class="sl">בחירה מהירה</div><div class="chips" id="chips"></div></div>
  <div class="sec"><div class="sl">יום מסוים</div><div class="frow"><input type="date" id="oneday" aria-label="יום מסוים"></div></div>
  <div class="sec"><div class="sl">מתאריך עד תאריך</div><div class="frow"><label for="d1">מ־</label><input type="date" id="d1"><label for="d2">עד</label><input type="date" id="d2"><button type="button" class="go" id="rgo">החל</button></div></div>
  <div class="sec"><div class="sl">חודש מסוים</div><div class="frow"><select id="msel" aria-label="חודש"></select><select id="ysel" aria-label="שנה"></select><button type="button" class="go" id="mgo">החל</button></div></div>
  <div class="sec"><div class="sl">שנה שלמה</div><div class="frow"><select id="yosel" aria-label="שנה שלמה"></select><button type="button" class="go" id="ygo">החל</button></div></div>
  <div class="cover" id="cover"></div>
</div>
<div id="askovl" style="position:fixed;inset:0;background:rgba(10,18,14,.45);z-index:110;display:none"></div>
<div id="asksheet" role="dialog" aria-modal="true" aria-label="שאלה חופשית">
  <div class="shead">
    <span class="t">שאלה חופשית על הנתונים</span>
    <button type="button" class="x" id="askx" aria-label="סגירה"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  </div>
  <div class="askrow">
    <textarea id="askq" rows="2" placeholder="למשל: כמה מכרנו בנתניה בכל אחד משלושת החודשים האחרונים?"></textarea>
    <button type="button" class="go" id="asksend">שלח</button>
  </div>
  <div class="askhint">התשובות מחושבות ישירות מנתוני פריוריטי שבענן. דוח מוצלח אפשר לקבע בהמשך כדוח קבוע. <span id="asktotal"></span></div>
  <div id="asklog"></div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  var META=null, TARGET=50, view='agents', dimKind='fam', dimMeasure='s';
  var DIMH={fam:'קטגוריות',part:'מוצרים',city:'ערים',sector:'מגזר',source:'מקור הגעה'};
  var SECN={'חילו.':'חילוני','חר.':'חרדי','ד.לא.':'דתי לאומי','רוס':'דובר רוסית','ע.ר':'המגזר הערבי','אחר':'אחר','לקוח מרחוק':'לקוח מרחוק','הזמנת שרות':'הזמנת שירות'};
  function dimName(k){if(dimKind==='sector')return SECN[k]||k;return k;}
  var BRN={'':'ללא שיוך סניף','PHONE':'טלפוני','101':'נתניה','102':'ראשל"צ','103':'אתר דיוואני','104':'מוקד משרדים','105':'חיפה','106':'ירושלים','107':'בית שמש'};
  function brName(b){var k=(b==null?'':String(b));return BRN[k]||('סניף '+k);}
  var eT={}, stage=document.getElementById('stage');
  var state={from:null,to:null,preset:null,clip:false};
  var cache={key:null,mode:null,rows:null,agg:null};
  var MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

  function pad(n){return (n<10?'0':'')+n;}
  function iso(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  function heDate(s){return s.slice(8,10)+'.'+s.slice(5,7)+'.'+s.slice(0,4);}
  function heShort(s){return s.slice(8,10)+'.'+s.slice(5,7);}
  function addDays(s,n){var d=new Date(s+'T12:00:00');d.setDate(d.getDate()+n);return iso(d);}
  function clampD(s){if(s<META.min)return META.min;if(s>META.max)return META.max;return s;}
  function anchor(){var t=META.today||iso(new Date());if(t>META.max)t=META.max;if(t<META.min)t=META.min;return t;}

  var PRESETS=[
    {id:'today',  l:'היום',       f:function(){var t=anchor();return [t,t];}},
    {id:'yest',   l:'אתמול',      f:function(){var t=addDays(anchor(),-1);return [t,t];}},
    {id:'week',   l:'השבוע',      f:function(){var t=anchor();var d=new Date(t+'T12:00:00');return [addDays(t,-d.getDay()),t];}},
    {id:'d7',     l:'7 ימים',     f:function(){var t=anchor();return [addDays(t,-6),t];}},
    {id:'month',  l:'החודש',      f:function(){var t=anchor();return [t.slice(0,8)+'01',t];}},
    {id:'pmonth', l:'חודש קודם',  f:function(){var t=anchor();var first=t.slice(0,8)+'01';var pend=addDays(first,-1);return [pend.slice(0,8)+'01',pend];}},
    {id:'d30',    l:'30 יום',     f:function(){var t=anchor();return [addDays(t,-29),t];}},
    {id:'ytd',    l:'השנה',       f:function(){var t=anchor();return [t.slice(0,4)+'-01-01',t];}}
  ];
  function presetLabel(id){var p=PRESETS.filter(function(x){return x.id===id;})[0];return p?p.l:'';}

  function nf(x){return Math.round(x).toLocaleString('en-US');}
  function ils(x){return '₪'+nf(x);}
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
  function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},4000);}

  /* ---- data via API ---- */
  function spanDays(){return Math.round((new Date(state.to+'T12:00:00')-new Date(state.from+'T12:00:00'))/86400000);}
  function desiredKey(){if(view==='cash')return state.from+'|'+state.to+'|C';if(view==='service')return state.from+'|'+state.to+'|S';if(view==='collect')return state.from+'|'+state.to+'|P';if(view==='dim')return state.from+'|'+state.to+'|D|'+dimKind+'|'+dimMeasure;return state.from+'|'+state.to+'|'+(spanDays()>META.line_span_days?view:'L');}
  function fetchRange(cb){
    var key=desiredKey();
    if(cache.key===key){cb();return;}
    stage.innerHTML='<div class="load"><span class="spin"></span>טוען נתונים…</div>';
    document.getElementById('kpis').innerHTML='';
    document.getElementById('notice').style.display='none';
    document.getElementById('hint').style.display='none';
    if(view!=='cash')document.getElementById('pendtr').style.display='none';
    document.getElementById('sellbl').textContent='טוען…';
    var url=view==='cash'?('/api/cash?d_from='+state.from+'&d_to='+state.to)
           :view==='collect'?('/api/collect?d_from='+state.from+'&d_to='+state.to)
           :view==='dim'?('/api/dim?d_from='+state.from+'&d_to='+state.to+'&dim='+dimKind+'&rank='+dimMeasure)
           :('/api/range?d_from='+state.from+'&d_to='+state.to+'&by='+(view==='branches'?'b':(view==='service'?'s':'a')));
    fetch(url,{cache:'no-store'})
      .then(function(r){if(r.status===401){location.href='/login';throw 0;}if(!r.ok)throw new Error('http '+r.status);return r.json();})
      .then(function(j){if(desiredKey()!==key)return;cache.key=key;cache.mode=j.mode;cache.rows=j.rows||null;cache.agg=j.agg||null;if(j.pending!==undefined){cache.pending=j.pending;cache.pendingAt=j.pending_at;}cb();})
      .catch(function(e){if(desiredKey()!==key)return;if(e!==0){stage.innerHTML='<div class="empty">שגיאה בטעינת נתונים.<br>בדוק חיבור ונסה שוב.</div>';toast('שגיאה בטעינת נתונים');}});
  }

  function build(rows){
    var multi=state.from!==state.to;
    var agents={}, custSet={}, orderCount=rows.length, posTotal=0;
    rows.forEach(function(r){
      var an=r.a||'ללא סוכן', ak='a_'+an, ck='c_'+r.cn;
      var ag=agents[ak]||(agents[ak]={n:an,s:0,profit:0,cu:{},custIds:{}});
      ag.custIds[ck]=1; custSet[ck]=1;
      var cu=ag.cu[ck]||(ag.cu[ck]={n:r.c||r.cn,s:0,profit:0,k:[]});
      (r.k||[]).forEach(function(L){
        var s=L[2]||0,p=L[3]||0;
        ag.s+=s;ag.profit+=p;cu.s+=s;cu.profit+=p;
        var sub=(L[1]?'מק"ט: '+L[1]:'')+(multi?(L[1]?' · ':'')+heShort(r.d):'');
        cu.k.push({n:L[0]||L[1]||'פריט',code:sub,s:s,profit:p,pm:s>0?100*p/s:null});
      });
    });
    var kids=Object.keys(agents).map(function(ak){
      var ag=agents[ak];
      var custKids=Object.keys(ag.cu).map(function(ck){
        var cu=ag.cu[ck];
        return {n:cu.n,s:cu.s,profit:cu.profit,pm:cu.s>0?100*cu.profit/cu.s:null,k:cu.k};
      });
      if(ag.s>0)posTotal+=ag.s;
      return {n:ag.n,s:ag.s,profit:ag.profit,pm:ag.s>0?100*ag.profit/ag.s:null,c:Object.keys(ag.custIds).length,k:custKids};
    });
    var ts=0,tp=0;kids.forEach(function(a){ts+=a.s;tp+=a.profit;});
    var tc=Object.keys(custSet).length;
    return {c:tc,s:ts,p:tp,pm:ts>0?100*tp/ts:null,av:tc>0?ts/tc:0,k:kids,orders:orderCount,pos:posTotal};
  }

  function buildAgg(agg){
    var kids=(agg.agents||[]).map(function(g){
      return {n:g.a||'ללא סוכן',s:g.s||0,profit:g.p||0,pm:(g.s>0)?100*g.p/g.s:null,c:g.c||0,k:null};
    });
    var ts=0,tp=0,pos=0;kids.forEach(function(a){ts+=a.s;tp+=a.profit;if(a.s>0)pos+=a.s;});
    var tc=agg.customers||0;
    return {c:tc,s:ts,p:tp,pm:ts>0?100*tp/ts:null,av:tc>0?ts/tc:0,k:kids,orders:agg.orders||0,pos:pos};
  }

  function buildBr(rows){
    var multi=state.from!==state.to;
    var brs={}, custSet={}, orderCount=rows.length, posTotal=0;
    rows.forEach(function(r){
      var bn=brName(r.b), bk='b_'+bn, an=r.a||'ללא סוכן', ak='a_'+an, ck='c_'+r.cn;
      var br=brs[bk]||(brs[bk]={n:bn,custIds:{},ag:{}});
      br.custIds[ck]=1; custSet[ck]=1;
      var ag=br.ag[ak]||(br.ag[ak]={n:an,s:0,profit:0,cu:{}});
      var cu=ag.cu[ck]||(ag.cu[ck]={n:r.c||r.cn,s:0,profit:0,k:[]});
      (r.k||[]).forEach(function(L){
        var s=L[2]||0,p=L[3]||0;
        ag.s+=s;ag.profit+=p;cu.s+=s;cu.profit+=p;
        var sub=(L[1]?'מק"ט: '+L[1]:'')+(multi?(L[1]?' · ':'')+heShort(r.d):'');
        cu.k.push({n:L[0]||L[1]||'פריט',code:sub,s:s,profit:p,pm:s>0?100*p/s:null});
      });
    });
    var kids=Object.keys(brs).map(function(bk){
      var br=brs[bk],bs=0,bp=0;
      var agKids=Object.keys(br.ag).map(function(ak){
        var ag=br.ag[ak];bs+=ag.s;bp+=ag.profit;
        if(ag.s>0)posTotal+=ag.s;
        var custKids=Object.keys(ag.cu).map(function(ck){
          var cu=ag.cu[ck];
          return {n:cu.n,s:cu.s,profit:cu.profit,pm:cu.s>0?100*cu.profit/cu.s:null,k:cu.k};
        });
        return {n:ag.n,s:ag.s,profit:ag.profit,pm:ag.s>0?100*ag.profit/ag.s:null,k:custKids};
      });
      return {n:br.n,s:bs,profit:bp,pm:bs>0?100*bp/bs:null,c:Object.keys(br.custIds).length,k:agKids};
    });
    var ts=0,tp=0;kids.forEach(function(a){ts+=a.s;tp+=a.profit;});
    var tc=Object.keys(custSet).length;
    return {c:tc,s:ts,p:tp,pm:ts>0?100*tp/ts:null,av:tc>0?ts/tc:0,k:kids,orders:orderCount,pos:posTotal};
  }

  function buildAggBr(agg){
    var kids=(agg.branches||[]).map(function(g){
      return {n:brName(g.b),s:g.s||0,profit:g.p||0,pm:(g.s>0)?100*g.p/g.s:null,c:g.c||0,k:null};
    });
    var ts=0,tp=0,pos=0;kids.forEach(function(a){ts+=a.s;tp+=a.profit;if(a.s>0)pos+=a.s;});
    if(typeof agg.pos==='number')pos=agg.pos;
    var tc=agg.customers||0;
    return {c:tc,s:ts,p:tp,pm:ts>0?100*tp/ts:null,av:tc>0?ts/tc:0,k:kids,orders:agg.orders||0,pos:pos};
  }

  /* cash slots: mz=מזומן, hv=העברות+ביט, sk=שיקים לא דחויים, ot=אשראי/אחר/שיקים דחויים */
  function cashSlot(k,pd,d){
    if(k==='cash')return 'mz';
    if(k==='transfer'||k==='bit')return 'hv';
    if(k==='check')return (pd&&pd>d)?'ot':'sk';
    return 'ot';
  }

  function buildCash(rows){
    var brs={}, T={mz:0,hv:0,sk:0,ot:0};
    rows.forEach(function(x){
      var slot=cashSlot(x.k,x.pd,x.d);
      var bn=brName(x.b), bk='b_'+bn;
      var br=brs[bk]||(brs[bk]={n:bn,mz:0,hv:0,sk:0,ot:0,rc:{}});
      var rc=br.rc['i_'+x.iv]||(br.rc['i_'+x.iv]={n:x.c||x.cn||'קבלה',code:x.iv+(state.from!==state.to?' · '+heShort(x.d):''),mz:0,hv:0,sk:0,ot:0});
      br[slot]+=x.s; rc[slot]+=x.s; T[slot]+=x.s;
    });
    var totalRc=0;
    var kids=Object.keys(brs).map(function(bk){
      var br=brs[bk];
      var rcs=Object.keys(br.rc).map(function(ik){
        var rc=br.rc[ik];rc.tot=rc.mz+rc.hv+rc.sk;rc.s=rc.tot;rc.k=null;return rc;
      });
      totalRc+=rcs.length;
      var tot=br.mz+br.hv+br.sk;
      return {n:br.n,mz:br.mz,hv:br.hv,sk:br.sk,ot:br.ot,tot:tot,s:tot,k:rcs};
    });
    return {mz:T.mz,hv:T.hv,sk:T.sk,ot:T.ot,tot:T.mz+T.hv+T.sk,k:kids,orders:totalRc};
  }

  function buildCashAgg(agg){
    var brs={};
    (agg.rows||[]).forEach(function(g){
      var bn=brName(g.b), bk='b_'+bn;
      var br=brs[bk]||(brs[bk]={n:bn,mz:0,hv:0,sk:0,ot:0});
      var slot=g.k==='cash'?'mz':(g.k==='transfer'||g.k==='bit')?'hv':(g.k==='check_now')?'sk':'ot';
      br[slot]+=(g.s||0);
    });
    var T={mz:0,hv:0,sk:0,ot:0};
    var kids=Object.keys(brs).map(function(bk){
      var br=brs[bk];T.mz+=br.mz;T.hv+=br.hv;T.sk+=br.sk;T.ot+=br.ot;
      var tot=br.mz+br.hv+br.sk;
      return {n:br.n,mz:br.mz,hv:br.hv,sk:br.sk,ot:br.ot,tot:tot,s:tot,k:null};
    });
    return {mz:T.mz,hv:T.hv,sk:T.sk,ot:T.ot,tot:T.mz+T.hv+T.sk,k:kids,orders:agg.receipts||0};
  }

  function buildCollect(agg){
    var kids=(agg.agents||[]).map(function(g){
      var s=g.s||0, sg=g.sg||0, r=g.r||0, disc=g.disc||0;
      return {n:g.a||'ללא סוכן',s:s,r:r,ratio:sg>0?100*r/sg:null,disc:disc,
              dpct:(s+disc)>0?100*disc/(s+disc):null,sg:sg,k:null};
    });
    var T={s:0,sg:0,r:0,disc:0};
    kids.forEach(function(a){T.s+=a.s;T.sg+=a.sg;T.r+=a.r;T.disc+=a.disc;});
    return {s:T.s,sg:T.sg,r:T.r,disc:T.disc,
            ratio:T.sg>0?100*T.r/T.sg:null,
            dpct:(T.s+T.disc)>0?100*T.disc/(T.s+T.disc):null,
            k:kids,orders:kids.length};
  }

  function buildDim(agg){
    var kids=(agg.rows||[]).map(function(g){
      var s=g.s||0,p=g.p||0;
      return {n:(dimKind==='part'?(g.lbl||g.k||'ללא תיאור'):dimName(g.k||'ללא נתון')),
              code:(dimKind==='part'?(g.k||''):null),
              s:s,profit:p,pm:s>0?100*p/s:null,q:g.q||0,c:g.c||0,no:g.n||0,k:null};
    });
    return {s:agg.total_s||0,q:agg.total_q||0,p:agg.total_p||0,
            orders:agg.orders||0,c:agg.customers||0,qcov:agg.qcov==null?null:agg.qcov,
            rest:agg.rest||null,k:kids};
  }

  function ROOT(){
    if(cache.mode==='agents')return buildAgg(cache.agg||{});
    if(cache.mode==='branches')return buildAggBr(cache.agg||{});
    if(cache.mode==='cashagg')return buildCashAgg(cache.agg||{});
    if(cache.mode==='cashlines')return buildCash(cache.rows||[]);
    if(cache.mode==='collect')return buildCollect(cache.agg||{});
    if(cache.mode==='dim')return buildDim(cache.agg||{});
    return view==='branches'?buildBr(cache.rows||[]):build(cache.rows||[]);
  }

  function pmTxt(pm){return pm==null?'—':Math.round(pm)+'%';}
  function pill(c){
    if(view==='service')return '<span class="mut">—</span>';
    if(c.profit<0)return '<span class="pill bad"><span class="crt down"></span>הפסד</span>';
    if(c.pm==null)return '<span class="mut">—</span>';
    var ok=c.pm>=TARGET;
    return '<span class="pill '+(ok?'ok':'warn')+'"><span class="crt '+(ok?'up':'down')+'"></span>'+Math.round(c.pm)+'%</span>';
  }
  function chevSvg(o){return '<svg class="chev'+(o?' open':'')+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 6l-6 6 6 6"/></svg>';}
  function sortK(a){return a.slice().sort(function(x,y){return y.s-x.s;});}
  function walk(kids,depth,base,out){sortK(kids).forEach(function(c,i){var id=base+'/'+i;out.push({c:c,depth:depth,id:id,hasK:!!(c.k&&c.k.length)});if(eT[id]&&c.k)walk(c.k,depth+1,id,out);});}

  function emptyHtml(){
    var isCurrent=state.to>=META.max;
    return '<div class="empty">אין הזמנות בתקופה שנבחרה.'+(isCurrent?'<br>אפשר לנסות "רענן עכשיו" למשיכת נתונים טריים מפריוריטי.':'')+'</div>';
  }

  function renderTable(R){
    if(!R.k.length){stage.innerHTML=emptyHtml();return;}
    var rows=[];walk(R.k,0,'',rows);
    var h='<div class="tw"><table><thead><tr><th class="nm">שם</th><th>'+(view==='service'?'חיובים':'מכירות')+'</th><th>אחוז מסה"כ</th><th>רווח</th><th>אחוז רווח</th><th>לקוחות</th><th>ממוצע</th></tr></thead><tbody>';
    rows.forEach(function(it){
      var c=it.c, cls=it.depth===0?'d0':'dn', ind=it.depth*14;
      var pct=(R.pos>0&&c.s>0)?Math.round(c.s/R.pos*100)+'%':'—';
      var nc=c.c||1, avg=nc>0?c.s/nc:0;
      var ch=it.hasK?chevSvg(!!eT[it.id]):'<span style="width:15px;flex:none"></span>';
      var sub=c.code?'<div class="c" title="'+esc(c.code)+'">'+esc(c.code)+'</div>':'';
      h+='<tr class="'+cls+(it.hasK?' row':'')+'" '+(it.hasK?'data-t="'+it.id+'" role="button" tabindex="0"':'')+'><td class="nm"><div class="nmc" style="margin-right:'+ind+'px">'+ch+'<div class="nlab'+(it.depth?' rail':'')+'"><div class="t" style="font-weight:'+(it.depth===0?500:400)+'">'+esc(c.n)+'</div>'+sub+'</div></div></td><td>'+ils(c.s)+'</td><td class="mut">'+pct+'</td><td>'+ils(c.profit)+'</td><td>'+pill(c)+'</td><td>'+(it.depth===0?nc:'')+'</td><td class="mut">'+(it.depth===0?ils(avg):'')+'</td></tr>';
    });
    h+='</tbody><tfoot><tr><td class="nm">סך הכל</td><td>'+ils(R.s)+'</td><td>'+(R.pos>0?'100%':'—')+'</td><td>'+ils(R.p)+'</td><td>'+pill({s:R.s,profit:R.p,pm:R.pm})+'</td><td>'+R.c+'</td><td>'+ils(R.av)+'</td></tr></tfoot></table></div>';
    stage.innerHTML=h;
  }

  function renderKpis(R){
    document.getElementById('kpis').innerHTML=
      '<div class="kpi"><div class="l">'+(view==='service'?'חיובים':'מכירות')+'</div><div class="v">'+ils(R.s)+'</div></div>'+
      '<div class="kpi"><div class="l">רווח</div><div class="v">'+ils(R.p)+'</div></div>'+
      '<div class="kpi"><div class="l">אחוז רווח</div><div class="v">'+(view==='service'?'—':pmTxt(R.pm))+'</div></div>'+
      '<div class="kpi"><div class="l">לקוחות</div><div class="v">'+R.c+'</div></div>';
  }

  function renderCashKpis(R){
    document.getElementById('kpis').innerHTML=
      '<div class="kpi"><div class="l">סה"כ מזומן</div><div class="v">'+ils(R.tot)+'</div></div>'+
      '<div class="kpi"><div class="l">מזומן בקופה</div><div class="v">'+ils(R.mz)+'</div></div>'+
      '<div class="kpi"><div class="l">העברות</div><div class="v">'+ils(R.hv)+'</div></div>'+
      '<div class="kpi"><div class="l">שיקים מזומן</div><div class="v">'+ils(R.sk)+'</div></div>';
  }

  function renderCashTable(R){
    if(!R.k.length){
      stage.innerHTML='<div class="empty">אין קבלות בתקופה שנבחרה.'+(state.to>=META.max?'<br>אפשר לנסות "רענן עכשיו" למשיכת נתונים טריים מפריוריטי.':'')+'</div>';
      return;
    }
    var rows=[];walk(R.k,0,'',rows);
    var h='<div class="tw"><table><thead><tr><th class="nm">שם</th><th>מזומן</th><th>העברות</th><th>שיקים מזומן</th><th>סה"כ מזומן</th><th>שאר תקבולים</th></tr></thead><tbody>';
    rows.forEach(function(it){
      var c=it.c, cls=it.depth===0?'d0':'dn', ind=it.depth*14;
      var ch=it.hasK?chevSvg(!!eT[it.id]):'<span style="width:15px;flex:none"></span>';
      var sub=c.code?'<div class="c" title="'+esc(c.code)+'">'+esc(c.code)+'</div>':'';
      h+='<tr class="'+cls+(it.hasK?' row':'')+'" '+(it.hasK?'data-t="'+it.id+'" role="button" tabindex="0"':'')+'><td class="nm"><div class="nmc" style="margin-right:'+ind+'px">'+ch+'<div class="nlab'+(it.depth?' rail':'')+'"><div class="t" style="font-weight:'+(it.depth===0?500:400)+'">'+esc(c.n)+'</div>'+sub+'</div></div></td><td>'+ils(c.mz)+'</td><td>'+ils(c.hv)+'</td><td>'+ils(c.sk)+'</td><td style="font-weight:500">'+ils(c.tot)+'</td><td class="mut">'+ils(c.ot)+'</td></tr>';
    });
    h+='</tbody><tfoot><tr><td class="nm">סך הכל</td><td>'+ils(R.mz)+'</td><td>'+ils(R.hv)+'</td><td>'+ils(R.sk)+'</td><td>'+ils(R.tot)+'</td><td>'+ils(R.ot)+'</td></tr></tfoot></table></div>';
    stage.innerHTML=h;
  }

  function renderPending(){
    var el=document.getElementById('pendtr');
    var list=(view==='cash'&&cache.pending)?cache.pending:null;
    if(!list||!list.length){el.style.display='none';el.innerHTML='';return;}
    var sum=0;list.forEach(function(p){sum+=p.show||0;});
    var h='<div class="pt">העברות בהמתנה לקבלה · '+list.length+' · '+ils(sum)+'</div>';
    list.slice().sort(function(a,b){return (b.d||'').localeCompare(a.d||'');}).forEach(function(p){
      h+='<div class="pr"><span class="nm2">'+esc(p.c||p.o)+'</span><span>'+ils(p.show)+'</span>'+
         '<span class="mut2">מאומת מהאסמכתא</span><span class="mut2">'+esc(brName(p.b))+'</span>'+
         (p.d?'<span class="mut2">הועלה '+heDate(p.d)+'</span>':'')+'</div>';
    });
    h+='<div class="pn">הסכומים אינם נכללים בסך המזומן — הם יעברו אליו אוטומטית עם הפקת הקבלה.'+(cache.pendingAt?' נסרק '+esc(cache.pendingAt)+'.':'')+'</div>';
    el.innerHTML=h;el.style.display='block';
  }

  function qf(x){return Math.round(x).toLocaleString('en-US');}
  function renderDimKpis(R){
    document.getElementById('kpis').innerHTML=
      '<div class="kpi"><div class="l">מכירות</div><div class="v">'+ils(R.s)+'</div></div>'+
      '<div class="kpi"><div class="l">כמות פריטים</div><div class="v">'+qf(R.q)+'</div></div>'+
      '<div class="kpi"><div class="l">הזמנות</div><div class="v">'+R.orders+'</div></div>'+
      '<div class="kpi"><div class="l">לקוחות</div><div class="v">'+R.c+'</div></div>';
  }

  function renderDimTable(R){
    if(!R.k.length){stage.innerHTML=emptyHtml();return;}
    var byQ=dimMeasure==='q';
    var kids=R.k;  // server already ranks by the chosen measure
    var totS=R.s,totQ=R.q;
    var h='<div class="tw"><table><thead><tr><th class="nm">'+(DIMH[dimKind]||'שם')+'</th><th>מכירות</th><th>כמות</th><th>אחוז מסה"כ</th><th>רווח</th><th>אחוז רווח</th><th>לקוחות</th></tr></thead><tbody>';
    kids.forEach(function(c){
      var base=byQ?totQ:totS,val=byQ?c.q:c.s;
      var pct=(base>0&&val>0)?Math.round(100*val/base)+'%':'—';
      var sub=c.code?'<div class="c" title="'+esc(c.code)+'">'+esc(c.code)+'</div>':'';
      h+='<tr class="d0"><td class="nm"><div class="nmc"><span style="width:15px;flex:none"></span><div class="nlab"><div class="t" style="font-weight:500">'+esc(c.n)+'</div>'+sub+'</div></div></td>'+
         '<td>'+ils(c.s)+'</td><td>'+qf(c.q)+'</td><td class="mut">'+pct+'</td>'+
         '<td>'+ils(c.profit)+'</td><td>'+pill(c)+'</td><td>'+c.c+'</td></tr>';
    });
    if(R.rest&&R.rest.cnt)h+='<tr class="dn"><td class="nm"><div class="nmc"><span style="width:15px;flex:none"></span><div class="nlab rail"><div class="t">עוד '+R.rest.cnt+' נוספים</div></div></div></td><td class="mut">'+ils(R.rest.s||0)+'</td><td class="mut">'+qf(R.rest.q||0)+'</td><td class="mut">—</td><td class="mut">'+ils(R.rest.p||0)+'</td><td class="mut">—</td><td class="mut">—</td></tr>';
    h+='</tbody><tfoot><tr><td class="nm">סך הכל</td><td>'+ils(R.s)+'</td><td>'+qf(R.q)+'</td><td>100%</td><td>'+ils(R.p)+'</td><td>'+pill({s:R.s,profit:R.p,pm:R.s>0?100*R.p/R.s:null})+'</td><td>'+R.c+'</td></tr></tfoot></table></div>';
    stage.innerHTML=h;
  }

  function renderCollectKpis(R){
    document.getElementById('kpis').innerHTML=
      '<div class="kpi"><div class="l">יחס מקדמות למחזור</div><div class="v">'+(R.ratio==null?'—':Math.round(R.ratio)+'%')+'</div></div>'+
      '<div class="kpi"><div class="l">מחזור</div><div class="v">'+ils(R.s)+'</div></div>'+
      '<div class="kpi"><div class="l">תקבולים</div><div class="v">'+ils(R.r)+'</div></div>'+
      '<div class="kpi"><div class="l">אחוז הנחה</div><div class="v">'+(R.dpct==null?'—':R.dpct.toFixed(1)+'%')+'</div></div>';
  }

  function renderCollectTable(R){
    if(!R.k.length){stage.innerHTML='<div class="empty">אין נתונים בתקופה שנבחרה.</div>';return;}
    var h='<div class="tw"><table><thead><tr><th class="nm">סוכן</th><th>מכירות</th><th>תקבולים</th><th>יחס מקדמות</th><th>הנחות</th><th>אחוז הנחה</th></tr></thead><tbody>';
    R.k.slice().sort(function(x,y){return y.s-x.s;}).forEach(function(c){
      h+='<tr class="d0"><td class="nm"><div class="nmc"><span style="width:15px;flex:none"></span><div class="nlab"><div class="t" style="font-weight:500">'+esc(c.n)+'</div></div></div></td>'+
         '<td>'+ils(c.s)+'</td><td>'+ils(c.r)+'</td>'+
         '<td>'+(c.ratio==null?'<span class="mut">—</span>':Math.round(c.ratio)+'%')+'</td>'+
         '<td>'+ils(c.disc)+'</td>'+
         '<td>'+(c.dpct==null?'<span class="mut">—</span>':c.dpct.toFixed(1)+'%')+'</td></tr>';
    });
    h+='</tbody><tfoot><tr><td class="nm">סך הכל</td><td>'+ils(R.s)+'</td><td>'+ils(R.r)+'</td><td>'+(R.ratio==null?'—':Math.round(R.ratio)+'%')+'</td><td>'+ils(R.disc)+'</td><td>'+(R.dpct==null?'—':R.dpct.toFixed(1)+'%')+'</td></tr></tfoot></table></div>';
    stage.innerHTML=h;
  }

  function renderStage(R){renderPending();if(view==='cash'){renderCashTable(R);}else if(view==='collect'){renderCollectTable(R);}else if(view==='dim'){renderDimTable(R);}else{renderTable(R);}}

  function selLabel(R){
    var lbl;
    if(state.preset&&!state.clip){lbl=presetLabel(state.preset)+' · '+(state.from===state.to?heShort(state.from):heShort(state.from)+'–'+heShort(state.to));}
    else if(state.from===state.to){lbl=heDate(state.from);}
    else{lbl=heShort(state.from)+' – '+heShort(state.to);}
    return lbl+' · '+R.orders+(view==='cash'?' קבלות':(view==='collect'?' סוכנים':' הזמנות'));
  }

  function renderMeta(R){
    document.getElementById('sellbl').textContent=selLabel(R);
    document.getElementById('builtlbl').textContent=META.last_sync?('עודכן '+META.last_sync):('רענון אוטומטי כל '+META.refresh_minutes+' דקות');
    var nt=document.getElementById('notice'),msgs=[];
    if(state.clip)msgs.push('מוצג חלק מהתקופה בלבד — יש נתונים מ־'+heDate(META.min)+' עד '+heDate(META.max)+'.');
    var longSpan=spanDays()>META.line_span_days;
    if(longSpan&&cache.mode==='agents')msgs.push('בטווח ארוך מוצג סיכום לפי סוכן, בלי צלילה ללקוחות.');
    if(longSpan&&cache.mode==='branches')msgs.push('בטווח ארוך מוצג סיכום לפי סניף, בלי צלילה.');
    if(longSpan&&cache.mode==='cashagg')msgs.push('בטווח ארוך מוצג סיכום לפי סניף, בלי פירוט קבלות.');
    if(view==='branches'&&state.from<'2024-03-01')msgs.push('שיוך הזמנות לסניפים קיים בפריוריטי רק מתחילת 2024 (במלואו מסוף פברואר) — הזמנות מוקדמות יותר מופיעות תחת "ללא שיוך סניף".');
    if(view==='cash'&&state.from<'2024-03-01')msgs.push('שיוך קבלות לסניפים קיים בפריוריטי רק משנת 2024 — קבלות מוקדמות יותר מופיעות כולן תחת "ללא שיוך סניף".');
    else if(view==='cash')msgs.push('חלק מהקבלות נרשמות בפריוריטי בלי שיוך סניף ומופיעות בשורה נפרדת.');
    if(view==='service')msgs.push('מוצגת פעילות אנשי השירות בלבד — היא אינה נספרת בדוחות המכירות.');
    if(view==='collect')msgs.push('התקבולים כוללים מע"מ; יחס המקדמות מחושב מול המחזור בהמרה לכולל מע"מ. הנחות = שורות קיזוז, קופונים ושוברים.');
    if(view==='dim'){
      if(dimKind==='sector'&&state.from<'2025-01-01')msgs.push('תיוג מגזר קיים בפריוריטי באופן מלא רק מלקוחות שנוצרו משנת 2025 — הזמנות מוקדמות יותר מופיעות תחת "ללא נתון".');
      if(dimKind==='city'&&state.from<'2022-01-01')msgs.push('רישום עיר הלקוח מלא בפריוריטי רק משנת 2022 — הזמנות מוקדמות יותר מופיעות תחת "ללא נתון".');
      if(dimKind==='source'&&state.from<'2020-01-01')msgs.push('רישום מקור ההגעה מלא בפריוריטי רק משנת 2020 — הזמנות מוקדמות יותר מופיעות תחת "ללא נתון".');
      var Rq=cache.mode==='dim'?(cache.agg||{}):{};
      if(Rq.qcov!=null&&Rq.qcov<100)msgs.push('נתוני כמות קיימים כרגע עבור '+Rq.qcov+' אחוז מהשורות בתקופה — המילוי ההיסטורי בעיצומו.');
    }
    if(msgs.length){nt.style.display='block';nt.textContent=msgs.join(' ');}else{nt.style.display='none';}
    var hintEl=document.getElementById('hint');
    if(cache.mode==='lines'){hintEl.textContent='הקש על שורה כדי לצלול · גלול הצידה לעוד עמודות';hintEl.style.display='block';}
    else if(cache.mode==='cashlines'){hintEl.textContent='הקש על סניף לפירוט קבלות · סה"כ מזומן = מזומן + העברות + שיקים לא דחויים';hintEl.style.display='block';}
    else{hintEl.style.display='none';}
  }

  function renderAll(){var R=ROOT();if(view==='cash'){renderCashKpis(R);}else if(view==='collect'){renderCollectKpis(R);}else if(view==='dim'){renderDimKpis(R);}else{renderKpis(R);}renderMeta(R);renderStage(R);}

  function apply(){eT={};renderChips();fetchRange(renderAll);}

  function setRange(f,t,preset){
    if(f>t){var x=f;f=t;t=x;}
    var noOverlap=t<META.min||f>META.max;
    if(noOverlap){
      state.from=f;state.to=t;state.preset=preset||null;state.clip=false;
      eT={};renderChips();
      if(view==='cash'){var R0={mz:0,hv:0,sk:0,ot:0,tot:0,k:[],orders:0};renderCashKpis(R0);renderMeta(R0);}
      else if(view==='collect'){var R1={s:0,sg:0,r:0,disc:0,ratio:null,dpct:null,k:[],orders:0};renderCollectKpis(R1);renderMeta(R1);}
      else if(view==='dim'){var R2={s:0,q:0,p:0,orders:0,c:0,qcov:null,rest:null,k:[]};renderDimKpis(R2);renderMeta(R2);}
      else{var R={c:0,s:0,p:0,pm:null,av:0,k:[],orders:0,pos:0};renderKpis(R);renderMeta(R);}
      document.getElementById('hint').style.display='none';
      stage.innerHTML='<div class="empty">אין נתונים בתקופה שבחרת.<br>יש נתונים מ־'+heDate(META.min)+' עד '+heDate(META.max)+'.</div>';
      return;
    }
    var cf=clampD(f),ct=clampD(t);
    state.clip=(cf!==f||ct!==t);
    state.from=cf;state.to=ct;state.preset=preset||null;
    apply();
  }

  function setPreset(id){
    var p=PRESETS.filter(function(x){return x.id===id;})[0];if(!p)return;
    var r=p.f();setRange(r[0],r[1],id);closeSheet();
  }

  function renderChips(){
    var el=document.getElementById('chips');
    el.innerHTML=PRESETS.map(function(p){
      var r=p.f();var dead=r[1]<META.min||r[0]>META.max;
      return '<button type="button" class="chip'+(state.preset===p.id?' on':'')+'" data-p="'+p.id+'"'+(dead?' disabled':'')+'>'+p.l+'</button>';
    }).join('');
  }

  /* ---- sheet ---- */
  var sheet=document.getElementById('sheet'),ovl=document.getElementById('ovl');
  function openSheet(){
    renderChips();
    document.getElementById('oneday').value=state.from===state.to?state.from:'';
    document.getElementById('d1').value=state.from;document.getElementById('d2').value=state.to;
    document.getElementById('msel').value=String(parseInt(state.to.slice(5,7),10));
    document.getElementById('ysel').value=state.to.slice(0,4);
    document.getElementById('yosel').value=state.to.slice(0,4);
    sheet.classList.add('on');ovl.classList.add('on');
  }
  function closeSheet(){sheet.classList.remove('on');ovl.classList.remove('on');}
  document.getElementById('selbtn').addEventListener('click',openSheet);
  document.getElementById('shx').addEventListener('click',closeSheet);
  ovl.addEventListener('click',closeSheet);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSheet();});

  document.getElementById('chips').addEventListener('click',function(e){
    var b=e.target.closest('[data-p]');if(b&&!b.disabled)setPreset(b.getAttribute('data-p'));
  });
  document.getElementById('oneday').addEventListener('change',function(){
    var v=this.value;if(!v)return;setRange(v,v,null);closeSheet();
  });
  document.getElementById('rgo').addEventListener('click',function(){
    var v1=document.getElementById('d1').value,v2=document.getElementById('d2').value;
    if(!v1&&!v2)return;if(!v1)v1=v2;if(!v2)v2=v1;
    setRange(v1,v2,null);closeSheet();
  });
  document.getElementById('mgo').addEventListener('click',function(){
    var m=parseInt(document.getElementById('msel').value,10),y=parseInt(document.getElementById('ysel').value,10);
    setRange(y+'-'+pad(m)+'-01',iso(new Date(y,m,0)),null);closeSheet();
  });
  document.getElementById('ygo').addEventListener('click',function(){
    var y=parseInt(document.getElementById('yosel').value,10);
    setRange(y+'-01-01',y+'-12-31',null);closeSheet();
  });

  /* ---- view toggle ---- */
  function setView(v){
    if(view===v)return;
    view=v;
    var H1={agents:'ביצועי סוכנים',branches:'מכירות לפי סניפים',cash:'תקבולים במזומן',service:'פעילות שירות',collect:'מקדמות והנחות',dim:'פילוח מכירות'};
    document.getElementById('h1t').textContent=H1[v]||H1.agents;
    var bs=document.querySelectorAll('#seg button');
    for(var i=0;i<bs.length;i++){var on=bs[i].getAttribute('data-v')===v;bs[i].classList.toggle('on',on);bs[i].setAttribute('aria-pressed',on?'true':'false');}
    document.getElementById('dimbar').style.display=(v==='dim')?'flex':'none';
    if(META&&state.from)apply();
  }
  document.getElementById('seg').addEventListener('click',function(e){
    var b=e.target.closest('[data-v]');if(b)setView(b.getAttribute('data-v'));
  });
  document.getElementById('dimbar').addEventListener('click',function(e){
    var d=e.target.closest('[data-d]');
    if(d){
      if(dimKind===d.getAttribute('data-d'))return;
      dimKind=d.getAttribute('data-d');
      var cs=document.querySelectorAll('#dimbar [data-d]');
      for(var i=0;i<cs.length;i++){var on=cs[i].getAttribute('data-d')===dimKind;cs[i].classList.toggle('on',on);cs[i].setAttribute('aria-pressed',on?'true':'false');}
      if(META&&state.from)apply();
      return;
    }
    var m=e.target.closest('[data-m]');
    if(m){
      if(dimMeasure===m.getAttribute('data-m'))return;
      dimMeasure=m.getAttribute('data-m');
      var ms=document.querySelectorAll('#dimbar [data-m]');
      for(var i2=0;i2<ms.length;i2++){var on2=ms[i2].getAttribute('data-m')===dimMeasure;ms[i2].classList.toggle('on',on2);ms[i2].setAttribute('aria-pressed',on2?'true':'false');}
      if(META&&state.from)apply();  // measure is part of the fetch key — server re-ranks
    }
  });

  /* ---- ask (free questions) ---- */
  var askSheet=document.getElementById('asksheet'),askOvl=document.getElementById('askovl');
  function askOpen(){askSheet.classList.add('on');askOvl.classList.add('on');setTimeout(function(){document.getElementById('askq').focus();},50);}
  function askClose(){askSheet.classList.remove('on');askOvl.classList.remove('on');}
  document.getElementById('askbtn').addEventListener('click',askOpen);
  document.getElementById('askx').addEventListener('click',askClose);
  askOvl.addEventListener('click',askClose);
  document.addEventListener('keydown',function(e){if(e.key==='Escape')askClose();});

  var askTotalIls=0;
  function askCostTxt(ils){
    if(ils>=1)return ils.toFixed(2)+' ₪';
    return Math.max(1,Math.round(ils*100))+' אגורות';
  }
  function askErrText(j,st){
    if(st===403||(j&&j.error==='admin_only'))return 'שאלות חופשיות פתוחות רק לדורון — יש להתחבר עם הסיסמה האישית.';
    if(j&&j.error==='no_key')return 'מפתח הבינה המלאכותית עדיין לא הוגדר בשרת. יש להריץ במחשב את "הגדרת מפתח בינה.cmd" שבתיקיית divani_bi\\cloud.';
    if(st===429||(j&&j.error==='rate'))return 'רגע בין שאלה לשאלה — נסה שוב בעוד כמה שניות.';
    if(j&&j.error==='loop')return 'השאלה מורכבת מדי לסבב אחד — נסה לפצל אותה.';
    if(j&&j.detail)return 'שגיאה: '+j.detail;
    return 'משהו השתבש. נסה שוב.';
  }

  function askSend(){
    var qEl=document.getElementById('askq'),q=qEl.value.trim();
    if(!q)return;
    var btn=document.getElementById('asksend');btn.disabled=true;
    var log=document.getElementById('asklog');
    var item=document.createElement('div');item.className='askitem';
    item.innerHTML='<div class="q">'+esc(q)+'</div><div class="askwait"><span class="spin"></span>חושב ובודק בנתונים…</div>';
    log.insertBefore(item,log.firstChild);
    qEl.value='';
    fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q:q})})
      .then(function(r){if(r.status===401){location.href='/login';throw 0;}return r.json().then(function(j){return {st:r.status,j:j};});})
      .then(function(x){
        var j=x.j,h='<div class="q">'+esc(q)+'</div>';
        if(j.answer){
          h+='<div class="a">'+esc(j.answer)+'</div>';
          if(typeof j.cost_ils==='number'){
            askTotalIls+=j.cost_ils;
            h+='<div class="cost">עלות משוערת: '+askCostTxt(j.cost_ils)+' · '+((j.ms||0)/1000).toFixed(1)+' שניות'+(j.sqls&&j.sqls.length?' · '+j.sqls.length+' שאילתות':'')+'</div>';
            document.getElementById('asktotal').textContent='סה"כ בישיבה הזו: '+askCostTxt(askTotalIls)+'.';
          }
          if(j.sqls&&j.sqls.length)h+='<details><summary>השאילתות שהורצו ('+j.sqls.length+')</summary>'+j.sqls.map(function(s){return '<code>'+esc(s)+'</code>';}).join('')+'</details>';
        }else{
          h+='<div class="a err">'+esc(askErrText(j,x.st))+'</div>';
        }
        item.innerHTML=h;
      })
      .catch(function(e){if(e!==0)item.innerHTML='<div class="q">'+esc(q)+'</div><div class="a err">בעיית תקשורת — בדוק חיבור ונסה שוב.</div>';})
      .then(function(){btn.disabled=false;});
  }
  document.getElementById('asksend').addEventListener('click',askSend);
  document.getElementById('askq').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();askSend();}
  });

  /* refresh now */
  document.getElementById('rfr').addEventListener('click',function(){
    var b=this;b.disabled=true;
    fetch('/api/refresh',{method:'POST'})
      .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});})
      .then(function(x){
        if(!x.ok){toast(x.j&&x.j.reason==='rate'?'רענון אחרון היה לפני פחות מדקה':'הרענון נכשל');return;}
        if(x.j.last_sync)META.last_sync=x.j.last_sync;
        if(x.j.receipts_ok===false)toast('המכירות עודכנו, אך רענון הקבלות נכשל — נתוני המזומן עלולים להיות ישנים');
        cache.key=null;apply();
      })
      .catch(function(){toast('הרענון נכשל');})
      .then(function(){setTimeout(function(){b.disabled=false;},3000);});
  });

  stage.addEventListener('click',function(e){var t=e.target.closest('[data-t]');if(t){var id=t.getAttribute('data-t');eT[id]=!eT[id];renderStage(ROOT());}});
  stage.addEventListener('keydown',function(e){if((e.key==='Enter'||e.key===' ')&&e.target.hasAttribute&&e.target.hasAttribute('data-t')){e.preventDefault();var id=e.target.getAttribute('data-t');eT[id]=!eT[id];renderStage(ROOT());}});

  /* ---- boot ---- */
  function boot(){
    fetch('/api/meta',{cache:'no-store'})
      .then(function(r){if(r.status===401){location.href='/login';throw 0;}if(!r.ok)throw new Error('http '+r.status);return r.json();})
      .then(function(m){
        META=m;
        if(!META.min){stage.innerHTML='<div class="empty">המסד עדיין מתמלא בנתונים — נסה שוב בעוד כמה דקות.</div>';return;}
        if(!META.admin)document.getElementById('askbtn').style.display='none';
        var ms=document.getElementById('msel'),ys=document.getElementById('ysel'),yo=document.getElementById('yosel');
        ms.innerHTML=MONTHS.map(function(n,i){return '<option value="'+(i+1)+'">'+n+'</option>';}).join('');
        var y0=parseInt(META.min.slice(0,4),10),y1=parseInt(META.max.slice(0,4),10),o='';
        for(var y=y1;y>=y0;y--)o+='<option value="'+y+'">'+y+'</option>';
        ys.innerHTML=o;yo.innerHTML=o;
        var d1=document.getElementById('d1'),d2=document.getElementById('d2'),od=document.getElementById('oneday');
        [d1,d2,od].forEach(function(el){el.min=META.min;el.max=META.max;});
        document.getElementById('cover').textContent='יש נתונים מ־'+heDate(META.min)+' עד '+heDate(META.max)+'.';
        setPreset('today');
      })
      .catch(function(e){if(e!==0){stage.innerHTML='<div class="empty">שגיאה בטעינה. רענן את הדף.</div>';}});
  }
  boot();
})();
</script>
</body>
</html>
